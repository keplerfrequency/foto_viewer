<!DOCTYPE html>
<html>

<head>
    <title>FOTOGRAFIA ANALÓGICA</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@splidejs/splide/dist/css/splide.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@splidejs/splide/dist/js/splide.min.js"></script>

    <link rel="stylesheet" type="text/css" href="style_buttons.css" media="all" />
    <link rel="stylesheet" type="text/css" href="style_page.css" media="all" />

    <link rel="icon" type="image/png" href="favicon2.png"/>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
    <script type="text/javascript" src="app2.js"></script>
</head>

<body style="background-color: lightgray;">
    <div id="content">
        <div id="text_top" class="text_top">
            <p>FOTOGRAFIA ANALÓGICA</p>
            <button id="info-button" class="info-button" type="button">i</button>
        </div>

        <div id="buttons" class="button-scroll-container">
            <ul id="button-repo" class="button-container">
                <script>generateButtons()</script>
                <!-- FILLED IN DYNAMICALLY-->
            </ul>
        </div>

        <div id="splide" class="splide">
            <div class="splide__track">
                <ul class="splide__list">
                    <li class="splide__slide"> <img src="welcome.png"></li>
                </ul>
            </div>
            <div class="slider-controls">
                <button id="custom-splide-prev" class="arrow-btn" aria-label="Previous">‹</button>
                <button id="custom-splide-next" class="arrow-btn" aria-label="Next">›</button>
            </div>
        </div>
        <div id="photo-counter"></div>
        <div id="photo-footer">
            
            <div id="alt_text">
                <pre id="line_breaker"></pre>
            </div>
        </div>
    </div>

    <div id="info-popup" class="info-popup">
        <div class="info-popup__content">
            <p>Photos from my analog collection starting in 2022 until today. Thanks for visiting, Alexandre Gabriel. All rights reserved.</p>
            <button id="info-popup-close" class="info-popup-close">Close</button>
        </div>
    </div>
</body>

<script>
    document.addEventListener('DOMContentLoaded', function () {

        fetchJson();

        splide = new Splide('#splide', {
            type: 'loop',
            autoplay: true,
            pagination: false,
            arrows: false,
            keyboard: true,
            autowidth: true,
        });

        splide.on('visible', function () {
            var currentIndex = splide.index;
            var currentSlideElement = splide.Components.Elements.slides[currentIndex];
            var imgElement = currentSlideElement.querySelector('img');
            if (imgElement) {
                var imgSrc = imgElement.getAttribute('src');
                getAltText(imgSrc);
            }
            updatePhotoCounter();
        });

        splide.mount();

        window.splide = splide;

        // Double-click to download
        var splideElement = document.getElementById('splide');
        if (splideElement) {
            splideElement.addEventListener('dblclick', function() {
                downloadCurrentPhoto();
            });
        }

        var prevControl = document.getElementById('custom-splide-prev');
        var nextControl = document.getElementById('custom-splide-next');
        var infoButton = document.getElementById('info-button');
        var infoPopup = document.getElementById('info-popup');
        var infoPopupClose = document.getElementById('info-popup-close');

        if (prevControl) {
            prevControl.addEventListener('click', function (event) {
                event.preventDefault();
                splide.go('<');
                setTimeout(function() {
                  var currentIndex = splide.index;
                  var currentSlideElement = splide.Components.Elements.slides[currentIndex];
                  var imgElement = currentSlideElement.querySelector('img');
                  if (imgElement) {
                      var imgSrc = imgElement.getAttribute('src');
                      getAltText(imgSrc);
                  }
                  updatePhotoCounter();
                }, 0);
            });
        }

        if (nextControl) {
            nextControl.addEventListener('click', function (event) {
                event.preventDefault();
                splide.go('>');
                setTimeout(function() {
                  var currentIndex = splide.index;
                  var currentSlideElement = splide.Components.Elements.slides[currentIndex];
                  var imgElement = currentSlideElement.querySelector('img');
                  if (imgElement) {
                      var imgSrc = imgElement.getAttribute('src');
                      getAltText(imgSrc);
                  }
                  updatePhotoCounter();
                }, 0);
            });
        }

        if (infoButton) {
            infoButton.addEventListener('click', function () {
                infoPopup.classList.add('visible');
            });
        }

        if (infoPopupClose) {
            infoPopupClose.addEventListener('click', function () {
                infoPopup.classList.remove('visible');
            });
        }

        if (infoPopup) {
            infoPopup.addEventListener('click', function (event) {
                if (event.target === infoPopup) {
                    infoPopup.classList.remove('visible');
                }
            });
        }

    });
</script>

</html>
